aid: keurig-dr-pepper
name: Keurig Dr Pepper
description: >-
  Keurig Dr Pepper is a leading North American beverage company formed by the 2018
  merger of Keurig Green Mountain and Dr Pepper Snapple Group. It operates a portfolio
  of more than 125 owned, licensed, partner, and allied brands across hot and cold
  beverages, including Keurig single-serve brewing systems and brands such as Dr Pepper,
  7UP, Snapple, Mott's, Bai, Green Mountain Coffee Roasters, and Peet's Coffee.
